services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dashboard_produtividade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d dashboard_produtividade']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      PORT: 3001
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: dashboard_produtividade
      PGUSER: postgres
      PGPASSWORD: postgres
      INGESTAO_CRON: '0 */2 * * *'
      INGESTAO_DIR: ./data
      JWT_SECRET: troque-por-um-segredo-forte-em-producao
      JWT_EXPIRES_IN: 8h
    volumes:
      - ./backend/data:/app/data
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  pgdata:
