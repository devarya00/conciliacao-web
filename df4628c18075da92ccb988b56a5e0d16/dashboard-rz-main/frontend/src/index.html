<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Dashboard de Produtividade e Operações</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <!--
    connect-src 'self' cobre deploy same-origin (nginx.conf faz proxy_pass
    /api -> backend). Se o frontend for hospedado separado do backend (ex.:
    Vercel), 'self' não cobre o domínio remoto da API — troque por
    connect-src 'self' https://dominio-do-backend quando essa URL existir.
  -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self';"
  />
</head>
<body>
  <app-root></app-root>
</body>
</html>
